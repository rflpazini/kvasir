# Production stack for the lxc-docker host on Proxmox.
#
# Conventions:
#   - bind mounts under /appdata/kvasir/, no `version:` field, no named volumes
#   - Traefik routes via docker-provider labels on this service. The kvasir
#     container is dual-homed: `edge` so Traefik can reach it, and a private
#     `kvasir-net` so Redis and FlareSolverr stay off the public network.
#   - kvasir.rflpazini.sh resolves through Traefik with lan-only +
#     secured-defaults middlewares (LAN-only access, single-user homelab).
#
# Bring up:
#   docker compose -f /appdata/kvasir/deploy/docker-compose.yml up -d --build

services:
  kvasir:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: kvasir:latest
    container_name: kvasir
    restart: unless-stopped
    environment:
      LISTEN_ADDR: ":8080"
      REDIS_ADDR: redis:6379
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      LOG_LEVEL: info
      ENABLE_DEBUG_ENDPOINTS: "false"
    volumes:
      - /appdata/kvasir/logs:/logs
    networks:
      - edge
      - kvasir-net
    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "edge"
      traefik.http.routers.kvasir.rule: "Host(`kvasir.rflpazini.sh`)"
      traefik.http.routers.kvasir.entrypoints: "websecure"
      traefik.http.routers.kvasir.tls: "true"
      traefik.http.routers.kvasir.tls.certresolver: "cloudflare"
      traefik.http.routers.kvasir.tls.domains[0].main: "rflpazini.sh"
      traefik.http.routers.kvasir.tls.domains[0].sans: "*.rflpazini.sh"
      traefik.http.routers.kvasir.middlewares: "lan-only@file,secured-defaults@file"
      traefik.http.services.kvasir.loadbalancer.server.port: "8080"
      traefik.http.services.kvasir.loadbalancer.healthcheck.path: "/healthz"
      traefik.http.services.kvasir.loadbalancer.healthcheck.interval: "30s"

  redis:
    image: redis:7-alpine
    container_name: kvasir-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - /appdata/kvasir/data/redis:/data
    networks:
      - kvasir-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: kvasir-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    networks:
      - kvasir-net

networks:
  edge:
    external: true
  kvasir-net:
    driver: bridge
